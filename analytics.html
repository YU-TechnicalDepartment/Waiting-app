<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>統計情報 - リアルタイム待ち時間管理システム</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #f0f4f8;          /* メインシステムと共通の薄いブルーグレー */
            --bg-surface: #f0f4f8;
            --bg-panel: #ffffff;         /* 要素を際立たせるための高品位な白背景 */
            --text-main: #1e293b;        /* 視認性の高い墨色 */
            --text-sub: #64748b;         /* 上品なグレー */
            --accent-blue: #3b82f6;      /* 鮮やかなブルー */
            --accent-hover: #2563eb;
            --accent-red: #ef4444;
            --success-green: #10b981;
            --border-soft: rgba(0, 0, 0, 0.06);
            --radius-main: 16px;
            --radius-sm: 8px;
            --shadow-subtle: 0 4px 20px rgba(0, 0, 0, 0.02), 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ヘッダーエリア */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header-title p {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        /* クイック統計カード（サマリー） */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .summary-card {
            background: var(--bg-panel);
            border-radius: var(--radius-main);
            padding: 24px;
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-subtle);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
        }

        .card-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .card-value span {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-sub);
            margin-left: 4px;
        }

        /* メインコンテンツ（グラフとテーブル） */
        .panel {
            background: var(--bg-panel);
            border-radius: var(--radius-main);
            padding: 28px;
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-subtle);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* データテーブル */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            padding: 12px 16px;
            color: var(--text-sub);
            font-weight: 600;
            border-bottom: 2px solid var(--bg-main);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-soft);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* 状態表示メッセージ */
        .status-message {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
            font-weight: 600;
        }

        /* 汎用ボタン */
        .btn {
            background-color: var(--accent-blue);
            color: #ffffff;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:disabled {
            background-color: var(--text-sub);
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* グラフコンテナ */
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        @media (max-width: 600px) {
            body { padding: 20px 12px; }
            .card-value { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-title">
            <h1>統計情報</h1>
            <p>リアルタイム待ち時間管理の統計情報です。</p>
        </div>
        <button id="refresh-btn" class="btn" onclick="fetchDataFromGAS()">データ更新</button>
    </div>

    <div class="summary-grid">
        <div class="summary-card">
            <div class="card-label">総稼働本部数</div>
            <div class="card-value" id="sum-rooms">-<span>ルーム</span></div>
        </div>
        <div class="summary-card">
            <div class="card-label">合計運用時間</div>
            <div class="card-value" id="sum-minutes">-<span>分</span></div>
        </div>
        <div class="summary-card">
            <div class="card-label">最高待ち時間</div>
            <div class="card-value" id="max-wait-time" style="color: var(--accent-red);">-<span>分待ち</span></div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">混雑ピーク時間の比較 (各履歴の最高待ち時間)</div>
        <div class="chart-container">
            <canvas id="analyticsChart"></canvas>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">運用ログ履歴</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>履歴表示</th>
                        <th>合計稼働時間</th>
                        <th>過去最高待ち時間</th>
                    </tr>
                </thead>
                <tbody id="log-table-body">
                    <tr>
                        <td colspan="3" class="status-message">データを読み込んでいます...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 🔗 GASのWebアプリURL
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyxuIiYTkhpfTeCbYuIaT5ad_hl4KQs6ytywkHLHnDRxSadA9dN7wvJSoDN_y_mvnoP/exec";

    let chartInstance = null;

    // グラフを描画・更新する関数
    function updateChart(labels, dataValues) {
        const ctx = document.getElementById('analyticsChart').getContext('2d');
        if (chartInstance) {
            chartInstance.destroy(); 
        }

        if (labels.length === 0) {
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            return;
        }

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '最高待ち時間',
                    data: dataValues,
                    backgroundColor: 'rgba(59, 130, 246, 0.85)', 
                    borderColor: '#3b82f6',
                    borderWidth: 1,
                    borderRadius: 8,
                    barPercentage: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(0, 0, 0, 0.04)' },
                        ticks: { callback: value => value + ' 分' }
                    },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    // 📡 GASから実際にデータを取得する関数
    async function fetchDataFromGAS() {
        const btn = document.getElementById('refresh-btn');
        const tbody = document.getElementById('log-table-body');
        
        btn.disabled = true;
        btn.innerText = "データ取得中...";

        try {
            const response = await fetch(GAS_WEBAPP_URL, { method: 'GET' });
            if (!response.ok) throw new Error("通信エラーが発生しました");
            
            const dataList = await response.json(); 

            if (!dataList || dataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="status-message">データがまだ登録されていません。</td></tr>`;
                resetUI();
                return;
            }

            let totalMinutes = 0;
            let absoluteMaxMinutes = 0;
            
            tbody.innerHTML = "";
            const chartLabels = [];
            const chartValues = [];

            // 最新のログデータが上に来るように逆順（新しい順）で表示
            const reversedData = [...dataList].reverse();
            const totalCount = reversedData.length;

            reversedData.forEach((item, index) => {
                const mins = parseInt(item.totalMinutes) || 0;
                const maxWait = parseInt(item.maxTeams) || 0; 

                totalMinutes += mins;
                if (maxWait > absoluteMaxMinutes) {
                    absoluteMaxMinutes = maxWait;
                }

                // 💡【プライバシー保護】部屋のリアルIDは一切使わず、連番で匿名化
                const anonymousLabel = `ルーム #${totalCount - index}`;
                
                chartLabels.push(anonymousLabel);
                chartValues.push(maxWait);

                const tr = document.createElement('tr');
                
                const hMins = Math.floor(mins / 60);
                const sMins = mins % 60;
                const formattedTime = `${mins}分 (${hMins}時間${sMins.toString().padStart(2, '0')}分)`;

                tr.innerHTML = `
                    <td style="font-weight:600; color:var(--text-sub);">${anonymousLabel}</td>
                    <td>${formattedTime}</td>
                    <td style="font-weight:700; color:var(--accent-blue);">${maxWait}分待ち</td>
                `;
                tbody.appendChild(tr);
            });

            // 最上部のサマリーカードの数値を更新
            document.getElementById('sum-rooms').innerHTML = `${dataList.length}<span>部屋</span>`;
            document.getElementById('sum-minutes').innerHTML = `${totalMinutes}<span>分</span>`;
            document.getElementById('max-wait-time').innerHTML = `${absoluteMaxMinutes}<span>分待ち</span>`;

            // グラフを描画（新しく取得した順（左が古く右が新しい）に並び替えて見やすく配置）
            // グラフは時系列順（左から古い順）にするため、chartLabels と chartValues を元データと同じ順に戻してセット
            const chronologicalLabels = dataList.map((_, idx) => `ルーム #${idx + 1}`);
            const chronologicalValues = dataList.map(item => parseInt(item.maxTeams) || 0);
            updateChart(chronologicalLabels, chronologicalValues);

        } catch (error) {
            console.error(error);
            tbody.innerHTML = `<tr><td colspan="3" class="status-message" style="color:var(--accent-red);">データの取得に失敗しました。</td></tr>`;
            resetUI();
        } finally {
            btn.disabled = false;
            btn.innerText = "データを更新";
        }
    }

    function resetUI() {
        document.getElementById('sum-rooms').innerHTML = `-<span>ルーム</span>`;
        document.getElementById('sum-minutes').innerHTML = `-<span>分</span>`;
        document.getElementById('max-wait-time').innerHTML = `-<span>分待ち</span>`;
        updateChart([], []);
    }

    // 画面を開いた瞬間に自動でロード
    window.addEventListener('DOMContentLoaded', () => {
        fetchDataFromGAS();
    });
</script>

</body>
</html>
